name: Package Plugin

on:
  workflow_call:
    inputs:
      plugin_name:
        required: true
        type: string
        description: "Name of the plugin"
      package_version:
        required: true
        type: string
        description: "Version number for the package"
      build_suffix:
        required: true
        type: string
        description: "Build suffix (framework)"
      build_status:
        required: true
        type: string
        description: "Status of the compilation step"
    outputs:
      package_path:
        description: "Path to the created package"
        value: ${{ jobs.package.outputs.package_path }}

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      package_path: ${{ steps.zip_plugin.outputs.package_path }}

    steps:
      - name: Download built plugin
        uses: actions/download-artifact@v4
        with:
          name: plugin-output
          path: ./plugin-output

      - name: Verify plugin artifacts
        run: |
          echo "Downloaded plugin files:"
          find ./plugin-output -type f | sort

          DLL_COUNT=$(find ./plugin-output -name "*.dll" | wc -l)
          if [ "$DLL_COUNT" -eq 0 ]; then
            echo "::error::No DLL files found in plugin output!"
            exit 1
          fi
          echo "Found $DLL_COUNT DLL file(s)."

      - name: Create ZIP package
        id: zip_plugin
        run: |
          cd ./plugin-output

          # Naming convention Lidarr expects: {PluginName}-{version}.{framework}.zip
          PACKAGE_NAME="${{ inputs.plugin_name }}-${{ inputs.package_version }}.${{ inputs.build_suffix }}.zip"

          echo "Files to package:"
          ls -lh

          zip "$PACKAGE_NAME" *

          if [ ! -f "$PACKAGE_NAME" ] || [ "$(stat -c%s "$PACKAGE_NAME")" -eq 0 ]; then
            echo "::error::Package was not created or is empty!"
            exit 1
          fi

          echo "Created package: $PACKAGE_NAME"
          echo "Contents:"
          unzip -l "$PACKAGE_NAME"

          echo "package_path=./plugin-output/$PACKAGE_NAME" >> $GITHUB_OUTPUT

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-package
          path: ${{ steps.zip_plugin.outputs.package_path }}
          retention-days: 7
