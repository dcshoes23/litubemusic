name: Compile Project

on:
  workflow_call:
    inputs:
      dotnet_version:
        required: true
        type: string
        description: ".NET SDK version to use"
      plugin_name:
        required: true
        type: string
        description: "Name of the plugin"
      package_version:
        required: true
        type: string
        description: "Version number for the package"
      framework:
        required: true
        type: string
        description: "Target framework"
      git_commit:
        required: true
        type: string
        description: "Git commit SHA"
      git_branch:
        required: true
        type: string
        description: "Git branch name"
      git_tag:
        required: false
        type: string
        description: "Git tag if available"
        default: ""
      repo_url:
        required: true
        type: string
        description: "Base repository URL"
      branch_repo_url:
        required: true
        type: string
        description: "Repository URL with branch path"
      repo_owner:
        required: true
        type: string
        description: "Repository owner"
    outputs:
      build_status:
        description: "Status of the build (success/failure)"
        value: ${{ jobs.compile.outputs.build_status }}

jobs:
  compile:
    runs-on: ubuntu-latest
    outputs:
      build_status: ${{ steps.build_result.outputs.status }}

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Verify Lidarr submodule
        run: |
          echo "Lidarr submodule contents:"
          ls -la Submodules/Lidarr/src/ || echo "::error::Lidarr submodule not initialised"

          COMMON_CSPROJ="Submodules/Lidarr/src/NzbDrone.Common/Lidarr.Common.csproj"
          CORE_CSPROJ="Submodules/Lidarr/src/NzbDrone.Core/Lidarr.Core.csproj"

          for f in "$COMMON_CSPROJ" "$CORE_CSPROJ"; do
            if [ -f "$f" ]; then
              echo "  ✓ $f"
            else
              echo "::error::Missing: $f"
              exit 1
            fi
          done

      - name: Display build parameters
        run: |
          echo "Plugin:    ${{ inputs.plugin_name }}"
          echo "Version:   ${{ inputs.package_version }}"
          echo "Branch:    ${{ inputs.git_branch }}"
          echo "Commit:    ${{ inputs.git_commit }}"
          echo "Tag:       ${{ inputs.git_tag }}"
          echo "Repo:      ${{ inputs.branch_repo_url }}"
          echo "Owner:     ${{ inputs.repo_owner }}"
          echo "Framework: ${{ inputs.framework }}"

      - name: Restore
        run: dotnet restore *.sln

      - name: Build
        run: |
          dotnet build *.sln -c Release \
            -p:Version=${{ inputs.package_version }} \
            -p:AssemblyVersion=${{ inputs.package_version }} \
            -p:FileVersion=${{ inputs.package_version }} \
            -p:Branch="${{ inputs.git_branch }}" \
            -p:GitCommit="${{ inputs.git_commit }}" \
            -p:GitTag="${{ inputs.git_tag }}" \
            -p:RepoUrl="${{ inputs.branch_repo_url }}" \
            -p:Author="${{ inputs.repo_owner }}" \
            -v:n

      - name: Collect plugin output
        id: collect_output
        run: |
          OUTPUT_DIR=_output/Release
          PLUGIN_DIR=plugin-files

          mkdir -p "$PLUGIN_DIR"

          DLL="$OUTPUT_DIR/Lidarr.Plugin.Litubemusic.dll"
          if [ ! -f "$DLL" ]; then
            echo "::error::Plugin DLL not found at $DLL"
            find . -name "Lidarr.Plugin.*.dll" | head -10
            exit 1
          fi
          cp "$DLL" "$PLUGIN_DIR/"

          MANIFEST=$(find . -name ".lidarr.plugin" -not -path "*/Submodules/*" -not -path "*/.git/*" | head -1)
          if [ -n "$MANIFEST" ]; then
            cp "$MANIFEST" "$PLUGIN_DIR/"
          fi

          echo "Plugin files:"
          ls -lh "$PLUGIN_DIR/"
          echo "plugin_dir=$PLUGIN_DIR" >> $GITHUB_OUTPUT

      - name: Record build result
        id: build_result
        run: echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-output
          path: ${{ steps.collect_output.outputs.plugin_dir }}
          retention-days: 1

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./**/*.binlog
            ./**/*.log
          retention-days: 1
          if-no-files-found: warn
