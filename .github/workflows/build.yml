name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Download Lidarr reference DLLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Use the authenticated token to avoid API rate limits
          RELEASES=$(curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/Lidarr/Lidarr/releases?per_page=20")

          # Find the download URL for the linux-core-x64 tarball
          ASSET_URL=$(echo "$RELEASES" | jq -r \
            '[.[] | .assets[] | select(.name | endswith("linux-core-x64.tar.gz"))] | first | .browser_download_url')

          if [[ -z "$ASSET_URL" || "$ASSET_URL" == "null" ]]; then
            echo "::error::Could not find a linux-core-x64.tar.gz asset in Lidarr releases"
            echo "Available releases and assets:"
            echo "$RELEASES" | jq -r '.[] | .tag_name + "  " + ([.assets[].name] | join(", "))'
            exit 1
          fi

          echo "Downloading: $ASSET_URL"
          curl -fL "$ASSET_URL" -o lidarr.tar.gz

          echo "Tarball contents (first 20 entries):"
          tar tzf lidarr.tar.gz | head -20

          tar xzf lidarr.tar.gz

          # Dynamically find where NzbDrone.Core.dll landed — handles any extraction layout
          CORE_DLL=$(find "$PWD" -name "NzbDrone.Core.dll" -not -path "*/.git/*" 2>/dev/null | head -1)
          if [[ -z "$CORE_DLL" ]]; then
            echo "::error::NzbDrone.Core.dll not found after extraction"
            echo "Directory listing:"
            ls -la
            exit 1
          fi

          LIDARR_PATH=$(dirname "$CORE_DLL")
          echo "LIDARR_PATH=$LIDARR_PATH" >> "$GITHUB_ENV"
          echo "Lidarr DLLs found at: $LIDARR_PATH"

          # Verify the DLLs we depend on are present
          for dll in NzbDrone.Core.dll NzbDrone.Common.dll NLog.dll FluentValidation.dll Newtonsoft.Json.dll; do
            if [[ -f "$LIDARR_PATH/$dll" ]]; then
              echo "  ✓ $dll"
            else
              echo "  ✗ $dll (missing — build may fail)"
            fi
          done

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release -p:LidarrPath="${{ env.LIDARR_PATH }}"

      - name: Determine version and asset name
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          # Must match the 'name' in .lidarr.plugin: Litubemusic-{version}.net8.0.zip
          echo "ASSET_NAME=Litubemusic-${VERSION}.net8.0.zip" >> "$GITHUB_ENV"

      - name: Package
        run: |
          mkdir dist
          cp _output/Release/Lidarr.Plugin.Litubemusic.dll dist/
          cp src/Lidarr.Plugin.Litubemusic/.lidarr.plugin dist/
          cd dist
          zip "${{ env.ASSET_NAME }}" Lidarr.Plugin.Litubemusic.dll .lidarr.plugin
          echo "Created: ${{ env.ASSET_NAME }}"
          ls -lh

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ASSET_NAME }}
          generate_release_notes: true
          prerelease: false
