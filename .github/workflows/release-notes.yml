name: Generate Release Notes

on:
  workflow_call:
    inputs:
      plugin_name:
        required: true
        type: string
        description: "Name of the plugin"
      package_version:
        required: true
        type: string
        description: "Version number for the release"
      build_suffix:
        required: true
        type: string
        description: "Build suffix (framework)"
      commit_messages:
        required: true
        type: string
        description: "Commit messages since last release"
      git_commit:
        required: true
        type: string
        description: "Git commit SHA"
      branch_repo_url:
        required: true
        type: string
        description: "Repository URL with branch path"
      git_branch:
        required: true
        type: string
        description: "Current git branch"
      plugin_input_format:
        required: true
        type: string
        description: "Plugin input format: name@owner or name@owner#branch"
    outputs:
      release_notes_id:
        description: "Artifact ID of the generated release notes"
        value: ${{ jobs.generate.outputs.release_notes_id }}

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      release_notes_id: ${{ steps.create_notes.outputs.release_notes_id }}

    steps:
      - name: Generate release notes
        id: create_notes
        run: |
          NOTES_ID="release-notes-${{ github.run_id }}"
          echo "release_notes_id=$NOTES_ID" >> $GITHUB_OUTPUT

          cat > release_notes.md << 'NOTES_EOF'
          ## 📝 What's New
          NOTES_EOF

          echo "${{ inputs.commit_messages }}" >> release_notes.md

          cat >> release_notes.md << NOTES_EOF

          ---

          ## 📥 Installation

          In Lidarr, go to **System → Plugins** and enter:
          \`${{ inputs.plugin_input_format }}\`

          ---

          ## 📦 Package Information

          | | |
          |---|---|
          | **Version** | ${{ inputs.package_version }} |
          | **.NET** | ${{ inputs.build_suffix }} |
          | **Commit** | ${{ inputs.git_commit }} |
          | **Branch** | ${{ inputs.git_branch }} |
          NOTES_EOF

          echo "Generated release notes:"
          cat release_notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.create_notes.outputs.release_notes_id }}
          path: release_notes.md
          retention-days: 1
